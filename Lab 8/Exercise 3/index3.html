<!doctype html>
<html>
  <head>
    <title>Exercise 3 - Course Enrollment</title>
  </head>
  <body>
    <h2>Exercise 3: ES6 Classes & Promises</h2>

    <p id="ex3Result1"></p>
    <p id="ex3Result2"></p>

    <script>
      class Course {
        constructor(courseName, instructor) {
          this.courseName = courseName;
          this.instructor = instructor;
        }

        displayCourse() {
          document.getElementById("ex3Result1").innerHTML =
            `Course: ${this.courseName}, Instructor: ${this.instructor}`;
        }
      }

      // Create course object
      let course1 = new Course("Web Technologies", "Dr. Kumar");
      course1.displayCourse();

      // Enrollment promise
      let enrollCourse = new Promise((resolve, reject) => {
        let seatsAvailable = true; // change to false to test "Course Full"
        if (seatsAvailable) resolve("Enrollment Successful");
        else reject("Course Full");
      });

      enrollCourse
        .then((msg) => (document.getElementById("ex3Result2").innerHTML = msg))
        .catch(
          (err) => (document.getElementById("ex3Result2").innerHTML = err),
        );
    </script>
  </body>
</html>
